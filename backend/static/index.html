<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Factory Perimeter Security AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            soc: { 900: '#0a0e1a', 800: '#0f1629', 700: '#151d36', 600: '#1c2847', 500: '#243058' }
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
    body { background: #0a0e1a; color: #e2e8f0; font-family: 'Inter', system-ui, sans-serif; margin: 0; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #0f1629; }
    ::-webkit-scrollbar-thumb { background: #243058; border-radius: 3px; }
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.3} }
    .pulse-dot { animation: pulse-dot 1s ease-in-out infinite; }
    @keyframes slide-in { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .slide-in { animation: slide-in .25s ease-out; }
    @keyframes flash-border { 0%,100%{border-color:rgba(239,68,68,.3)} 50%{border-color:rgba(239,68,68,.8)} }
    .flash-border { animation: flash-border 1s ease-in-out infinite; }
    @keyframes count-up { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
    .count-up { animation: count-up .4s ease-out; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel" data-type="module">
    const { useState, useEffect, useCallback, useRef } = React;

    // ── Config ────────────────────────────────────────────────────────
    const SEVERITY_BADGE = {
      High:   'bg-red-500/20 text-red-400 border border-red-500/40',
      Medium: 'bg-amber-500/20 text-amber-400 border border-amber-500/40',
      Low:    'bg-yellow-500/20 text-yellow-400 border border-yellow-500/40',
    };
    const EVENT_BADGE = {
      'Intrusion':     'bg-red-900/50 text-red-300',
      'Line Crossing': 'bg-purple-900/50 text-purple-300',
      'Loitering':     'bg-amber-900/50 text-amber-300',
      'Climbing':      'bg-pink-900/50 text-pink-300',
      'After Hours':   'bg-blue-900/50 text-blue-300',
    };
    const EVENT_ICON = { 'Intrusion':'🚨','Line Crossing':'⛔','Loitering':'🕵️','Climbing':'🧗','After Hours':'🌙' };

    function timeAgo(iso) {
      const s = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
      if (s < 5) return 'just now';
      if (s < 60) return s + 's ago';
      if (s < 3600) return Math.floor(s/60) + 'm ago';
      return Math.floor(s/3600) + 'h ago';
    }
    function fmtDateTime(iso) { return new Date(iso).toLocaleString('vi-VN'); }

    // ── Mock ──────────────────────────────────────────────────────────
    const MOCK_EVENTS = [
      { id:1, timestamp:new Date(Date.now()-8000).toISOString(),   event_type:'Intrusion',     severity:'High',   message:'Person #3 entered Zone-A restricted area', snapshot_path:null },
      { id:2, timestamp:new Date(Date.now()-35000).toISOString(),  event_type:'Line Crossing', severity:'High',   message:'Person #7 crossed virtual fence inbound',  snapshot_path:null },
      { id:3, timestamp:new Date(Date.now()-90000).toISOString(),  event_type:'Loitering',     severity:'Medium', message:'Person #5 loitering near gate > 12s',      snapshot_path:null },
      { id:4, timestamp:new Date(Date.now()-180000).toISOString(), event_type:'Climbing',      severity:'High',   message:'Climbing detected near north fence',       snapshot_path:null },
      { id:5, timestamp:new Date(Date.now()-400000).toISOString(), event_type:'Line Crossing', severity:'Medium', message:'Person #2 exited perimeter',               snapshot_path:null },
    ];
    const MOCK_STATS = { active_cameras:1, total_alerts_today:5, intrusions:2, climbing_suspects:1, loitering_events:1, line_crossings:2, system_status:'Online', roi_active:true };

    // ── Data Hook ─────────────────────────────────────────────────────
    function useSecurityData(backendUp) {
      const [events, setEvents] = useState(MOCK_EVENTS);
      const [stats, setStats]   = useState(MOCK_STATS);
      const [videos, setVideos] = useState([]);
      const prevCount = useRef(0);
      const [newAlert, setNewAlert] = useState(false);

      const fetchData = useCallback(async () => {
        if (!backendUp) return;
        try {
          const [eR,sR,vR] = await Promise.all([fetch('/api/events?limit=50'),fetch('/api/stats'),fetch('/api/videos')]);
          if (eR.ok) { const d = await eR.json(); setEvents(d.length ? d : MOCK_EVENTS); if (d.length > prevCount.current) { setNewAlert(true); setTimeout(() => setNewAlert(false), 2000); } prevCount.current = d.length; }
          if (sR.ok) setStats(await sR.json());
          if (vR.ok) setVideos(await vR.json());
        } catch {}
      }, [backendUp]);

      useEffect(() => { fetchData(); const id = setInterval(fetchData, 2000); return () => clearInterval(id); }, [fetchData]);
      return { events, stats, videos, newAlert };
    }

    // ── SVG Icons ─────────────────────────────────────────────────────
    const Svg = ({ children, className='w-4 h-4' }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
    );
    const ShieldIcon = ({className}) => <Svg className={className}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></Svg>;
    const CamIcon = ({className}) => <Svg className={className}><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></Svg>;
    const BellIcon = ({className}) => <Svg className={className}><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></Svg>;
    const AlertIcon = ({className}) => <Svg className={className}><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></Svg>;
    const XIcon = ({className}) => <Svg className={className}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></Svg>;
    const TableIcon = ({className}) => <Svg className={className}><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></Svg>;
    const VideoIcon = ({className}) => <Svg className={className}><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></Svg>;
    const TrashIcon = ({className}) => <Svg className={className}><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></Svg>;
    const DownloadIcon = ({className}) => <Svg className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></Svg>;

    // ── Header ────────────────────────────────────────────────────────
    function Header({ stats, backendUp, newAlert }) {
      return (
        <header className={`flex items-center justify-between px-6 py-2.5 border-b bg-soc-800/90 backdrop-blur-sm transition-all duration-300 ${newAlert ? 'border-red-500/60' : 'border-slate-700/50'}`}>
          <div className="flex items-center gap-3">
            <div className={`p-2 rounded-lg border transition-all duration-300 ${newAlert ? 'bg-red-500/20 border-red-500/50 flash-border' : 'bg-red-500/10 border-red-500/30'}`}>
              <ShieldIcon className="w-5 h-5 text-red-400" />
            </div>
            <div>
              <h1 className="text-sm font-bold text-slate-100 tracking-widest">FACTORY PERIMETER SECURITY AI</h1>
              <p className="text-[10px] text-slate-500 tracking-wider">YOLOv8s + ByteTrack + Pose Estimation</p>
            </div>
          </div>
          <div className="flex items-center gap-5">
            <StatChip icon={<CamIcon className="w-3.5 h-3.5"/>} label="Cameras" value={`${stats.active_cameras}`} color="green" />
            <StatChip icon={<AlertIcon className="w-3.5 h-3.5"/>} label="Alerts" value={`${stats.total_alerts_today}`} color="red" />
            <span className={`flex items-center gap-1.5 text-[11px] font-semibold px-3 py-1.5 rounded-full ${backendUp ? 'bg-green-500/15 text-green-400 border border-green-500/30' : 'bg-yellow-500/15 text-yellow-400 border border-yellow-500/30'}`}>
              <span className={`w-1.5 h-1.5 rounded-full pulse-dot ${backendUp ? 'bg-green-400' : 'bg-yellow-400'}`} />
              {backendUp ? 'LIVE' : 'DEMO'}
            </span>
          </div>
        </header>
      );
    }
    function StatChip({ icon, label, value, color }) {
      const colors = { green:'text-green-400', red:'text-red-400', blue:'text-blue-400' };
      return (
        <div className="flex items-center gap-1.5 text-xs">
          <span className="text-slate-500">{icon}</span>
          <span className="text-slate-500">{label}</span>
          <span className={`font-bold ${colors[color]}`}>{value}</span>
        </div>
      );
    }

    // ── Stats Cards ───────────────────────────────────────────────────
    function StatsBar({ stats }) {
      const cards = [
        { label:'Total Alerts',       value:stats.total_alerts_today, icon:'🔔', border:'border-red-500/30',    bg:'bg-red-500/5',    text:'text-red-400' },
        { label:'Intrusions',         value:stats.intrusions||0,      icon:'🚨', border:'border-orange-500/30', bg:'bg-orange-500/5', text:'text-orange-400' },
        { label:'Climbing Suspects',  value:stats.climbing_suspects||0,icon:'🧗', border:'border-pink-500/30',   bg:'bg-pink-500/5',   text:'text-pink-400' },
        { label:'Loitering',          value:stats.loitering_events||0, icon:'🕵️', border:'border-amber-500/30',  bg:'bg-amber-500/5',  text:'text-amber-400' },
        { label:'Line Crossings',     value:stats.line_crossings||0,   icon:'⛔', border:'border-purple-500/30', bg:'bg-purple-500/5', text:'text-purple-400' },
      ];
      return (
        <div className="grid grid-cols-5 gap-2.5 px-4 py-2.5 border-b border-slate-700/50 bg-soc-800/40">
          {cards.map(c => (
            <div key={c.label} className={`rounded-lg border px-3 py-2.5 ${c.border} ${c.bg}`}>
              <div className="flex items-center justify-between mb-1">
                <span className="text-[10px] text-slate-500 uppercase tracking-wider">{c.label}</span>
                <span className="text-sm">{c.icon}</span>
              </div>
              <p className={`text-2xl font-bold ${c.text} count-up mono`}>{c.value}</p>
            </div>
          ))}
        </div>
      );
    }

    // ── Video Panel ───────────────────────────────────────────────────
    function VideoPanel({ backendUp, videos, onSwitchVideo }) {
      const [err, setErr] = useState(false);
      const [clock, setClock] = useState('');
      const [feedKey, setFeedKey] = useState(0);
      useEffect(() => { const t = setInterval(() => setClock(new Date().toLocaleString('vi-VN')), 1000); return () => clearInterval(t); }, []);

      const handleSwitch = async (v) => {
        await fetch(`/api/videos/switch?filename=${encodeURIComponent(v)}`, { method: 'POST' });
        setErr(false);
        setFeedKey(k => k + 1);
      };

      return (
        <div className="flex flex-col h-full">
          <div className="flex items-center justify-between px-4 py-1.5 border-b border-slate-700/50 bg-soc-800/60">
            <div className="flex items-center gap-2">
              <CamIcon className="w-3.5 h-3.5 text-cyan-400" />
              <span className="text-xs font-medium text-slate-300">CAM-01 · North Perimeter</span>
            </div>
            <div className="flex items-center gap-3">
              {videos.length > 0 && (
                <select onChange={e => handleSwitch(e.target.value)}
                  className="text-[10px] bg-soc-700 border border-slate-600/40 rounded px-2 py-0.5 text-slate-300 outline-none">
                  {videos.map(v => <option key={v} value={v}>{v}</option>)}
                </select>
              )}
              <span className="flex items-center gap-1 text-[10px] text-red-400 font-bold">
                <span className="w-1.5 h-1.5 rounded-full bg-red-500 pulse-dot" /> REC
              </span>
              <span className="text-[10px] text-slate-600">YOLOv8s + Pose</span>
            </div>
          </div>
          <div className="relative flex-1 bg-black flex items-center justify-center overflow-hidden">
            {backendUp && !err ? (
              <img key={feedKey} src={`/video_feed?t=${feedKey}`} alt="Live" className="w-full h-full object-contain"
                onError={() => setErr(true)} />
            ) : (
              <MockVideo />
            )}
            <div className="absolute bottom-2 left-2 bg-black/70 px-2.5 py-1 rounded backdrop-blur-sm">
              <span className="text-[10px] text-slate-400 mono">{clock}</span>
            </div>
            <div className="absolute top-2 right-2 flex gap-1.5">
              <span className="bg-red-500/20 border border-red-500/40 px-2 py-0.5 rounded text-[10px] text-red-300 font-bold">ROI ACTIVE</span>
              <span className="bg-purple-500/20 border border-purple-500/40 px-2 py-0.5 rounded text-[10px] text-purple-300 font-bold">FENCE LINE</span>
            </div>
            <div className="absolute bottom-2 right-2 flex gap-1.5">
              <span className="bg-green-500/20 border border-green-500/40 px-1.5 py-0.5 rounded text-[10px] text-green-300 mono">960×540</span>
            </div>
          </div>
        </div>
      );
    }

    function MockVideo() {
      return (
        <div className="w-full h-full relative" style={{ background:'linear-gradient(135deg,#0f1629 0%,#151d36 50%,#0a0e1a 100%)' }}>
          <div className="absolute inset-0 opacity-[0.03]" style={{ backgroundImage:'linear-gradient(rgba(255,255,255,.3) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.3) 1px,transparent 1px)', backgroundSize:'50px 50px' }}/>
          <div className="absolute border-2 border-green-400/70 rounded" style={{top:'30%',left:'12%',width:'50px',height:'110px'}}>
            <span className="absolute -top-4 left-0 text-green-400 text-[9px] mono bg-black/80 px-1 rounded">#1 Person</span>
          </div>
          <div className="absolute border-2 border-green-400/70 rounded" style={{top:'35%',left:'32%',width:'45px',height:'100px'}}>
            <span className="absolute -top-4 left-0 text-green-400 text-[9px] mono bg-black/80 px-1 rounded">#2 Person</span>
          </div>
          <div className="absolute border-2 border-red-400 rounded flash-border" style={{top:'22%',left:'62%',width:'55px',height:'120px'}}>
            <span className="absolute -top-4 left-0 text-red-400 text-[9px] mono bg-red-900/80 px-1 rounded">#5 INTRUDER</span>
          </div>
          <div className="absolute border-2 border-dashed border-red-500/50" style={{top:'12%',left:'52%',width:'44%',height:'76%',borderRadius:'4px'}}>
            <span className="absolute -top-4 left-1 text-red-400 text-[9px] mono bg-red-900/60 px-1.5 py-0.5 rounded">RESTRICTED ZONE-A</span>
          </div>
          <div className="absolute border-l-2 border-purple-500/60" style={{top:'5%',left:'50%',height:'90%'}}/>
          <div className="absolute inset-0 flex items-center justify-center">
            <div className="text-center bg-black/50 px-8 py-5 rounded-xl backdrop-blur-sm border border-slate-700/30">
              <VideoIcon className="w-8 h-8 text-cyan-500/60 mx-auto mb-2"/>
              <p className="text-slate-400 text-sm font-medium">AI Video Analytics Engine</p>
              <p className="text-slate-600 text-[10px] mt-1">Waiting for backend connection...</p>
            </div>
          </div>
        </div>
      );
    }

    // ── Alert Panel ───────────────────────────────────────────────────
    const ALL_TYPES = ['All','Intrusion','Line Crossing','Loitering','Climbing'];

    function AlertPanel({ events, backendUp }) {
      const [filter, setFilter] = useState('All');
      const [selected, setSelected] = useState(null);
      const filtered = filter === 'All' ? events : events.filter(e => e.event_type === filter);

      const clearEvents = async () => { await fetch('/api/events/clear', { method:'POST' }); };

      return (
        <div className="flex flex-col h-full">
          <div className="flex items-center justify-between px-3 py-2 border-b border-slate-700/50">
            <div className="flex items-center gap-2">
              <BellIcon className="w-3.5 h-3.5 text-red-400" />
              <span className="text-xs font-bold text-slate-200">Alerts</span>
              <span className="text-[10px] bg-red-500/20 text-red-400 border border-red-500/30 rounded-full px-1.5 py-0.5 font-bold mono">{events.length}</span>
            </div>
            {backendUp && <button onClick={clearEvents} title="Clear all events" className="text-slate-600 hover:text-red-400 transition-colors"><TrashIcon className="w-3.5 h-3.5"/></button>}
          </div>
          <div className="flex gap-1 px-2 py-1.5 flex-wrap border-b border-slate-700/30">
            {ALL_TYPES.map(t => (
              <button key={t} onClick={() => setFilter(t)}
                className={`text-[10px] px-2 py-0.5 rounded-full font-medium transition-all ${filter === t ? 'bg-blue-600 text-white' : 'bg-soc-700 text-slate-500 hover:text-slate-300'}`}>
                {t === 'All' ? `All (${events.length})` : t}
              </button>
            ))}
          </div>
          <div className="flex-1 overflow-y-auto">
            {filtered.length === 0 && <div className="flex items-center justify-center h-24 text-slate-600 text-xs">No alerts matching filter</div>}
            {filtered.map((e, i) => (
              <button key={e.id} onClick={() => setSelected(e)}
                className={`slide-in w-full text-left px-3 py-2.5 border-b border-slate-700/20 hover:bg-soc-700/50 transition-colors ${i === 0 ? 'bg-red-900/8' : ''}`}>
                <div className="flex items-start gap-2">
                  <span className="text-base mt-0.5">{EVENT_ICON[e.event_type]||'⚠️'}</span>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center justify-between gap-1 mb-0.5">
                      <span className={`text-[10px] px-1.5 py-0.5 rounded font-bold ${EVENT_BADGE[e.event_type]||''}`}>{e.event_type}</span>
                      <span className={`text-[10px] px-1.5 py-0.5 rounded-full font-bold ${SEVERITY_BADGE[e.severity]||''}`}>{e.severity}</span>
                    </div>
                    <p className="text-[11px] text-slate-300 truncate">{e.message}</p>
                    <p className="text-[10px] text-slate-600 mt-0.5 mono">{timeAgo(e.timestamp)}</p>
                  </div>
                </div>
                {e.snapshot_path && (
                  <img src={'/snapshots/'+e.snapshot_path} alt="" className="mt-1.5 ml-6 w-[calc(100%-1.5rem)] h-14 object-cover rounded border border-slate-600/30" />
                )}
              </button>
            ))}
          </div>
          {selected && <SnapshotModal event={selected} onClose={() => setSelected(null)} />}
        </div>
      );
    }

    // ── Snapshot Modal ────────────────────────────────────────────────
    function SnapshotModal({ event, onClose }) {
      return (
        <div className="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4" onClick={onClose}>
          <div className="bg-soc-800 border border-slate-700 rounded-xl max-w-2xl w-full shadow-2xl" onClick={e => e.stopPropagation()}>
            <div className="flex items-center justify-between px-5 py-3 border-b border-slate-700/50">
              <div className="flex items-center gap-2">
                <span className="text-xl">{EVENT_ICON[event.event_type]}</span>
                <div>
                  <h3 className="font-bold text-slate-100 text-sm">{event.event_type} Detected</h3>
                  <p className="text-[10px] text-slate-500 mono">{fmtDateTime(event.timestamp)}</p>
                </div>
              </div>
              <button onClick={onClose} className="text-slate-500 hover:text-slate-300 transition-colors"><XIcon className="w-5 h-5"/></button>
            </div>
            <div className="p-5">
              {event.snapshot_path
                ? <img src={'/snapshots/'+event.snapshot_path} alt="" className="w-full rounded-lg border border-slate-600/30 mb-4 shadow-lg" />
                : <div className="w-full h-48 bg-soc-900 rounded-lg border border-slate-600/30 flex items-center justify-center mb-4"><p className="text-slate-600 text-sm">No snapshot captured</p></div>
              }
              <div className="grid grid-cols-3 gap-3 text-xs">
                <div className="bg-soc-900 rounded-lg p-3 border border-slate-700/30">
                  <span className="text-slate-500 block mb-1">Severity</span>
                  <span className={`px-2 py-0.5 rounded-full font-bold ${SEVERITY_BADGE[event.severity]}`}>{event.severity}</span>
                </div>
                <div className="bg-soc-900 rounded-lg p-3 border border-slate-700/30">
                  <span className="text-slate-500 block mb-1">Type</span>
                  <span className="text-slate-200 font-semibold">{event.event_type}</span>
                </div>
                <div className="bg-soc-900 rounded-lg p-3 border border-slate-700/30">
                  <span className="text-slate-500 block mb-1">Time</span>
                  <span className="text-slate-200 mono text-[11px]">{fmtDateTime(event.timestamp)}</span>
                </div>
              </div>
              <div className="mt-3 bg-soc-900 rounded-lg p-3 border border-slate-700/30">
                <span className="text-slate-500 text-xs block mb-1">Detail</span>
                <span className="text-slate-200 text-sm">{event.message}</span>
              </div>
            </div>
            <div className="px-5 pb-4 flex gap-2 justify-end">
              {event.snapshot_path && (
                <a href={'/snapshots/'+event.snapshot_path} download className="flex items-center gap-1 text-xs px-3 py-1.5 rounded-lg bg-blue-600/20 text-blue-400 hover:bg-blue-600/30 border border-blue-600/30 transition-colors">
                  <DownloadIcon className="w-3 h-3"/> Download
                </a>
              )}
              <button onClick={onClose} className="text-xs px-3 py-1.5 rounded-lg bg-soc-700 text-slate-400 hover:bg-soc-600 transition-colors">Close</button>
            </div>
          </div>
        </div>
      );
    }

    // ── Event Table ───────────────────────────────────────────────────
    function EventTable({ events }) {
      return (
        <div className="flex flex-col h-full">
          <div className="flex items-center gap-2 px-4 py-1.5 border-b border-slate-700/50 bg-soc-800/60">
            <TableIcon className="w-3.5 h-3.5 text-slate-400" />
            <span className="text-xs font-bold text-slate-300">Event Log</span>
            <span className="text-[10px] text-slate-600 mono">{events.length} records</span>
          </div>
          <div className="flex-1 overflow-auto">
            <table className="w-full text-[11px]">
              <thead className="sticky top-0 bg-soc-800 border-b border-slate-700/50 z-10">
                <tr>
                  {['#','Time','Type','Severity','Description','Evidence'].map(h =>
                    <th key={h} className="text-left px-3 py-1.5 text-slate-500 font-semibold text-[10px] uppercase tracking-wider">{h}</th>
                  )}
                </tr>
              </thead>
              <tbody>
                {events.map((e, i) => (
                  <tr key={e.id} className={`border-b border-slate-700/15 hover:bg-soc-700/30 transition-colors ${e.severity === 'High' && i < 3 ? 'bg-red-900/5' : ''}`}>
                    <td className="px-3 py-2 text-slate-600 mono">{e.id}</td>
                    <td className="px-3 py-2 text-slate-400 mono whitespace-nowrap">{fmtDateTime(e.timestamp)}</td>
                    <td className="px-3 py-2"><span className={`px-1.5 py-0.5 rounded font-bold text-[10px] ${EVENT_BADGE[e.event_type]||''}`}>{EVENT_ICON[e.event_type]} {e.event_type}</span></td>
                    <td className="px-3 py-2"><span className={`px-1.5 py-0.5 rounded-full font-bold text-[10px] ${SEVERITY_BADGE[e.severity]||''}`}>{e.severity}</span></td>
                    <td className="px-3 py-2 text-slate-300 max-w-xs truncate">{e.message}</td>
                    <td className="px-3 py-2">{e.snapshot_path ? <a href={'/snapshots/'+e.snapshot_path} target="_blank" className="text-cyan-400 hover:text-cyan-300 underline underline-offset-2 text-[10px]">View</a> : <span className="text-slate-700">—</span>}</td>
                  </tr>
                ))}
              </tbody>
            </table>
            {events.length === 0 && <div className="flex items-center justify-center h-20 text-slate-700 text-xs">Waiting for events...</div>}
          </div>
        </div>
      );
    }

    // ── App ───────────────────────────────────────────────────────────
    function App() {
      const [backendUp, setBackendUp] = useState(false);
      useEffect(() => { fetch('/api/stats').then(r => { if (r.ok) setBackendUp(true); }).catch(() => {}); }, []);
      const { events, stats, videos, newAlert } = useSecurityData(backendUp);

      return (
        <div className="flex flex-col h-screen overflow-hidden bg-soc-900 text-slate-200">
          <Header stats={stats} backendUp={backendUp} newAlert={newAlert} />
          <StatsBar stats={stats} />
          <div className="flex flex-1 overflow-hidden min-h-0">
            <div className="flex-1 border-r border-slate-700/50 overflow-hidden bg-black">
              <VideoPanel backendUp={backendUp} videos={videos} />
            </div>
            <div className="w-80 xl:w-96 flex-shrink-0 bg-soc-800 overflow-hidden">
              <AlertPanel events={events} backendUp={backendUp} />
            </div>
          </div>
          <div className="h-48 border-t border-slate-700/50 bg-soc-800/60 overflow-hidden flex-shrink-0">
            <EventTable events={events} />
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
